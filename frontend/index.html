<!DOCTYPE html>
<html>
<head>

<title>AI Multilingual Voice Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

.container{
max-width:950px;
margin:40px auto;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
padding:15px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
margin-bottom:15px;
font-size:15px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

select{
flex:1;
padding:12px;
border-radius:10px;
border:none;
font-size:14px;
background:#1e293b;
color:white;
}

.section{
margin-top:20px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.05);
position:relative;
}

.speaker{
position:absolute;
right:15px;
top:15px;
font-size:18px;
cursor:pointer;
}

.notes button{
background:linear-gradient(135deg,#f59e0b,#f97316);
margin:5px;
width:50px;
}

.loader{
text-align:center;
display:none;
margin-top:10px;
font-size:14px;
color:#60a5fa;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Multilingual Voice Studio</h1>

<textarea id="text" rows="3" placeholder="Type or speak your text..."></textarea>

<div class="row">

<select id="language">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
<option value="gu">Gujarati</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="kn">Kannada</option>
<option value="or">Odia</option>
</select>

<select id="voiceType">
<option value="john">John</option>
<option value="daniel">Daniel</option>
<option value="michael">Michael</option>
<option value="david">David</option>
<option value="bella">Bella</option>
<option value="sarah">Sarah</option>
<option value="lily">Lily</option>
<option value="emma">Emma</option>
</select>

<select id="accent">
<option value="india">Indian Accent</option>
<option value="us">US Accent</option>
<option value="uk">UK Accent</option>
<option value="australia">Australian Accent</option>
<option value="canada">Canadian Accent</option>
<option value="singapore">Singapore Accent</option>
</select>

</div>

<div class="row">
<button onclick="processText()">Process</button>
</div>

<div class="loader" id="loader">Analyzing your Input...</div>

<div class="section">

<h3>Translated Output</h3>

<span id="speaker" class="speaker">🔊</span>

<p id="translated">Your translation will appear here</p>

</div>

<div class="section">

<h3>Harmonium</h3>

<!--  removed Play AI Music button -->

<div class="notes">

<button onclick="play('sa')">sa</button>
<button onclick="play('re')">re</button>
<button onclick="play('ga')">ga</button>
<button onclick="play('ma')">ma</button>
<button onclick="play('pa')">pa</button>
<button onclick="play('dha')">dha</button>
<button onclick="play('ni')">ni</button>

</div>

<p style="font-size:12px;">Keyboard: A S D F G H J</p>

</div>

</div>

<script>

let notes=[]
let audio=new Audio()
let mute=false

document.getElementById("speaker").onclick=function(){

mute=!mute

this.innerText=mute?"🔇":"🔊"

if(mute)audio.pause()
else audio.play()

}

async function processText(){

let text=document.getElementById("text").value
let lang=document.getElementById("language").value
let voice=document.getElementById("voiceType").value
let accent=document.getElementById("accent").value

if(!text)return

let loader=document.getElementById("loader")
loader.style.display="block"

let res=await fetch("http://127.0.0.1:5000/process",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
text:text,
lang:lang,
voice:voice,
accent:accent
})

})

let data=await res.json()

document.getElementById("translated").innerText=data.translated

notes=data.notes

audio.src=data.audio_url

if(!mute){
audio.play()
}

loader.style.display="none"

}

const recognition=new webkitSpeechRecognition()

recognition.continuous=false
recognition.interimResults=true

//  Start voice when clicking textarea
document.getElementById("text").addEventListener("click",()=>{
recognition.start()
})

recognition.onresult=function(event){

let transcript=""

for(let i=event.resultIndex;i<event.results.length;i++){
transcript+=event.results[i][0].transcript
}

document.getElementById("text").value=transcript

processText()

recognition.stop()


}

//  Harmonium

const audioCtx=new(window.AudioContext||window.webkitAudioContext)()

const notesFreq={
sa:277.18,
re:311.13,
ga:349.23,
ma:369.99,
pa:415.30,
dha:466.16,
ni:523.25
}

function play(note){

let freq=notesFreq[note]
if(!freq)return

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.type="sawtooth"
osc.frequency.value=freq

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.setValueAtTime(0.001,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.5,audioCtx.currentTime+0.05)
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.8)

osc.start()
osc.stop(audioCtx.currentTime+0.8)

}

//  Keyboard support
document.addEventListener("keydown",function(e){

let map={
a:'sa',
s:'re',
d:'ga',
f:'ma',
g:'pa',
h:'dha',
j:'ni'
}

let note=map[e.key]

if(note){
play(note)
}

})

</script>

</body>
</html>
