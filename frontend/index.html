<!DOCTYPE html>
<html>
<head>

<title>AI Multilingual Voice Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* Sidebar */

.sidebar{
width:240px;
background:#0f172a;
padding:25px;
display:flex;
flex-direction:column;
gap:20px;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:20px;
font-weight:700;
margin-bottom:20px;
}

.navbtn{
padding:12px;
border-radius:10px;
background:#1e293b;
cursor:pointer;
transition:0.3s;
}

.navbtn:hover{
background:#6366f1;
}

/* Main */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.section{
display:none;
}

.active{
display:block;
}

/* Translator */

textarea{
width:100%;
padding:15px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
margin-bottom:15px;
font-size:15px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

select,button{
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
cursor:pointer;
}

button{
background:#6366f1;
}

/* AI Sphere */

.sphere{
width:150px;
height:150px;
border-radius:50%;
margin:30px auto;
background:radial-gradient(circle,#6366f1,#0ea5e9);
box-shadow:0 0 60px #6366f1;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

/* Waves */

.waves{
display:flex;
justify-content:center;
gap:6px;
margin-top:10px;
}

.waves span{
width:6px;
height:25px;
background:#60a5fa;
animation:wave 1s infinite ease-in-out;
}

.waves span:nth-child(2){animation-delay:0.1s}
.waves span:nth-child(3){animation-delay:0.2s}
.waves span:nth-child(4){animation-delay:0.3s}
.waves span:nth-child(5){animation-delay:0.4s}

@keyframes wave{
0%,100%{transform:scaleY(0.4)}
50%{transform:scaleY(1.5)}
}

/* Harmonium Layout */

.harmoniumWrapper{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
}

.harmoniumBoard{

background:linear-gradient(#8b5a2b,#5c3a1a);
padding:30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.harmonium{
display:flex;
gap:6px;
}

/* Keys */

.key{
width:90px;
height:320px;
background:linear-gradient(#ffffff,#ddd);
border-radius:6px;
display:flex;
align-items:flex-end;
justify-content:center;
font-weight:600;
color:black;
padding-bottom:15px;
cursor:pointer;
transition:0.08s;
box-shadow:0 8px #aaa;
font-size:18px;
}

.key.active{
transform:translateY(8px);
box-shadow:0 0 #aaa;
background:#fde68a;
}

.output{
margin-top:20px;
padding:15px;
background:#0f172a;
border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">AI Voice Studio</div>

<div class="navbtn" onclick="showSection('translator')">
AI Voice Translator
</div>

<div class="navbtn" onclick="showSection('harmonium')">
AI Harmonium Studio
</div>

</div>

<div class="main">

<!-- TRANSLATOR -->

<div id="translator" class="section active">

<h2>AI Voice Translator</h2>

<div class="sphere"></div>

<div class="waves">
<span></span><span></span><span></span><span></span><span></span>
</div>

<textarea id="text" rows="3" placeholder="Click here and start speaking..."></textarea>

<div class="row">

<select id="language">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="gu">Gujarati</option>
</select>

<select id="voiceType">
<option value="john">John</option>
<option value="bella">Bella</option>
<option value="daniel">Daniel</option>
<option value="emma">Emma</option>
</select>

<select id="accent">
<option value="india">Indian Accent</option>
<option value="us">US Accent</option>
<option value="uk">UK Accent</option>
<option value="australia">Australia</option>
</select>

<button onclick="processText()">Process</button>

</div>

<div class="output">

<h3>Translation</h3>
<p id="translated">Waiting for input...</p>

</div>

</div>

<!-- HARMONIUM -->

<div id="harmonium" class="section">

<h2 style="text-align:center">AI Harmonium Studio</h2>

<div class="harmoniumWrapper">

<div class="harmoniumBoard">

<div class="harmonium">

<div class="key" data-note="sa">Sa</div>
<div class="key" data-note="re">Re</div>
<div class="key" data-note="ga">Ga</div>
<div class="key" data-note="ma">Ma</div>
<div class="key" data-note="pa">Pa</div>
<div class="key" data-note="dha">Dha</div>
<div class="key" data-note="ni">Ni</div>

</div>

</div>

</div>

<p style="text-align:center;margin-top:20px">
Keyboard: A S D F G H J
</p>

</div>

</div>

<script>

/* Navigation */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* Translator */

let audio=new Audio()

async function processText(){

let text=document.getElementById("text").value
let lang=document.getElementById("language").value
let voice=document.getElementById("voiceType").value
let accent=document.getElementById("accent").value

if(!text) return

let res=await fetch("http://127.0.0.1:5000/process",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
text:text,
lang:lang,
voice:voice,
accent:accent
})

})

let data=await res.json()

document.getElementById("translated").innerText=data.translated

audio.src=data.audio_url
audio.play()

}

/* Voice Recognition */

let recognition

if('webkitSpeechRecognition' in window){

recognition=new webkitSpeechRecognition()

recognition.continuous=false
recognition.interimResults=true
recognition.lang="en-US"

recognition.onresult=function(event){

let transcript=""

for(let i=0;i<event.results.length;i++){
transcript+=event.results[i][0].transcript
}

document.getElementById("text").value=transcript

}

recognition.onend=function(){
processText()
}

}

/* Start mic when textbox clicked */

document.getElementById("text").addEventListener("click",function(){

if(recognition){
recognition.start()
}

})

/* Harmonium Engine */

const audioCtx=new(window.AudioContext||window.webkitAudioContext)()

const notesFreq={
sa:277.18,
re:311.13,
ga:349.23,
ma:369.99,
pa:415.30,
dha:466.16,
ni:523.25
}

let activeOsc={}

function startNote(note){

if(activeOsc[note]) return

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.type="sawtooth"
osc.frequency.value=notesFreq[note]

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.setValueAtTime(0.4,audioCtx.currentTime)

osc.start()

activeOsc[note]={osc,gain}

document.querySelector(`[data-note="${note}"]`).classList.add("active")

}

function stopNote(note){

if(!activeOsc[note]) return

activeOsc[note].osc.stop()

delete activeOsc[note]

document.querySelector(`[data-note="${note}"]`).classList.remove("active")

}

/* Mouse interaction */

document.querySelectorAll(".key").forEach(key=>{

let note=key.dataset.note

key.addEventListener("mousedown",()=>startNote(note))
key.addEventListener("mouseup",()=>stopNote(note))
key.addEventListener("mouseleave",()=>stopNote(note))

})

/* Keyboard harmonium */

const keyMap={
a:'sa',
s:'re',
d:'ga',
f:'ma',
g:'pa',
h:'dha',
j:'ni'
}

document.addEventListener("keydown",e=>{
let note=keyMap[e.key]
if(note) startNote(note)
})

document.addEventListener("keyup",e=>{
let note=keyMap[e.key]
if(note) stopNote(note)
})

</script>

</body>
</html>
